<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLI '26 | Create</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>

    <nav class="glass-nav">
        <a href="index.html" class="logo">HOLI<span>'26</span></a>
        <ul class="nav-links">
            <li><a href="history.html">Mythos</a></li>
            <li><a href="card.html" class="active">Create Card</a></li>
        </ul>
    </nav>

    <main class="card-page">
        <div id="card-preview">
            <div id="splatter-container"></div>
            <div class="card-content">
                <h2 id="card-greeting">HAPPY <br><span>HOLI</span></h2>
                <p id="card-message">May your life be as vibrant as these colors.</p>
                <p id="card-from">— FROM [YOUR NAME]</p>
            </div>
        </div>

        <section class="controls">
            <div class="input-group">
                <label>PERSONALIZE YOUR NAME</label>
                <input type="text" id="input-from" placeholder="Type your name..." maxlength="20">
            </div>
            
            <div class="input-group">
                <label>CHOOSE A VIBE</label>
                <select id="input-message">
                    <option value="May your life be as vibrant as these colors.">Classic</option>
                    <option value="Drenched in joy, dipped in colors. Let's party!">Party</option>
                    <option value="Wishing you a year full of light and success.">Professional</option>
                </select>
            </div>

            <button id="download-btn" class="primary-btn btn">DOWNLOAD FOR INSTA STORY</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
