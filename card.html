<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLI '26 | Create</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>
    <nav class="glass-nav">
        <a href="index.html" class="logo">HOLI<span>'26</span></a>
        <ul class="nav-links">
            <li><a href="history.html">Mythos</a></li>
            <li><a href="card.html" class="active">Create Card</a></li>
        </ul>
    </nav>
    <main style="padding-top: 140px; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px;">
        <div id="card-preview">
            <div id="splatter-container" style="position: absolute; width:100%; height:100%;"></div>
            <div class="card-content">
                <h2 id="card-greeting">HAPPY <br><span>HOLI</span></h2>
                <p id="card-message" style="font-size: 0.9rem; margin: 15px 0;">Wishing you a year full of colors and success.</p>
                <p id="card-from" style="color: var(--secondary); font-weight: 900;">— FROM [YOUR NAME]</p>
            </div>
        </div>

        <div style="width: 320px; margin-top: 30px; display: flex; flex-direction: column; gap: 15px;">
            <input type="text" id="input-from" placeholder="Enter Your Name" style="padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; border-radius: 12px;">
            <select id="input-message" style="padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; border-radius: 12px;">
                <option value="Wishing you a year full of colors and success.">Classic Vibe</option>
                <option value="Let the colors of Holi paint a path to joy for you!">Joyful Vibe</option>
            </select>
            <button id="download-btn" class="primary-btn btn">DOWNLOAD FOR INSTA STORY</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
